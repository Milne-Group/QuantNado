site_name: QuantNado
site_description: Efficient genomic signal quantification and analysis
site_author: Milne Group
site_url: https://milne-group.github.io/QuantNado

theme:
  name: material
  logo: assets/images/logo.png
  palette:
    # Dark mode (default)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep-purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep-purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

markdown_extensions:
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
      toc_depth: 4
  - pymdownx.highlight:
      use_pygments: true
      line_spans: __span
      pygments_lang_class: true
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - codehilite:
      guess_lang: false
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - abbr

plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      include_source: true
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_root_toc_entry: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            filters:
              - "!^_"

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quick_start.md
  - Usage:
    - Workflows: basic_usage.md
    - CLI Overview: cli/index.md
    - Create Dataset: cli/create_dataset.md
    - Call Peaks: cli/call_peaks.md
    - CLI Reference: cli.md
  - API Reference:
    - QuantNado: api/quantnado.md
    - MultiomicsStore: api/multiomicsstore.md
    - BamStore: api/bamstore.md
    - MethylStore: api/methylstore.md
    - VariantStore: api/variantstore.md
  - Examples:
    - Overview: examples.md
    - Example Notebook: example_dataset.ipynb
  - Help:
    - FAQ: faq.md
    - Troubleshooting: troubleshooting.md

repo_url: https://github.com/Milne-Group/QuantNado
repo_name: Milne-Group/QuantNado
edit_uri: edit/develop/docs/

copyright: Copyright &copy; 2025 - 2026 Milne Group

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Milne-Group/QuantNado
      name: QuantNado on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/quantnado
      name: QuantNado on PyPI

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
