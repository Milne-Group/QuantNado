name: Tests

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Build SEACR test image
        run: docker build -f tests/integration/seacr_data/Dockerfile -t quantnado-seacr-test:local .

      - name: Run tests
        env:
          SEACR_DOCKER_IMAGE: quantnado-seacr-test:local
        run: uv run pytest tests
